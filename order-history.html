<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Riwayat Pesanan — Alfas Step</title>
  <meta name="description" content="Pantau riwayat dan status pesanan sepatu Alfas Step Anda.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease both; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen transition-colors duration-300">
  <div id="navbar"></div>

  <main class="max-w-4xl mx-auto px-4 py-12">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-8 gap-4">
      <div>
        <h1 class="text-3xl font-black text-slate-900 dark:text-white uppercase tracking-tighter">Riwayat Pesanan</h1>
        <p class="text-slate-500 dark:text-slate-400 font-medium mt-1">Pantau status pengiriman produk Alfas Step Anda.</p>
      </div>
      <a href="index.html" class="text-indigo-600 dark:text-indigo-400 font-bold hover:underline text-sm flex items-center gap-1">
        ← Kembali Belanja
      </a>
    </div>

    <div id="order-list" class="space-y-6 fade-in"></div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    const statusColors = {
      'Diproses'   : 'bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-400',
      'Dikirim'    : 'bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400',
      'Selesai'    : 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400',
      'Dibatalkan' : 'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400',
    };

    function renderOrderHistory() {
      // Coba dari 'alfas_orders' (format baru) atau 'orders' (format lama)
      const orders = JSON.parse(localStorage.getItem('alfas_orders') || localStorage.getItem('orders') || '[]');
      const list   = document.getElementById('order-list');

      if (orders.length === 0) {
        list.innerHTML = `
          <div class="bg-white dark:bg-slate-900 p-16 rounded-3xl text-center border border-dashed border-slate-200 dark:border-slate-800 shadow-sm">
            <div class="text-5xl mb-4">📦</div>
            <h2 class="text-xl font-black text-slate-700 dark:text-white mb-2">Belum Ada Pesanan</h2>
            <p class="text-slate-400 text-sm mb-6">Mulai belanja dan pesanan Anda akan muncul di sini.</p>
            <a href="index.html" class="inline-block bg-slate-900 dark:bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:opacity-90 transition text-sm">
              Mulai Belanja
            </a>
          </div>`;
        return;
      }

      list.innerHTML = orders.map(order => {
        const status  = order.status || 'Diproses';
        const colorCls = statusColors[status] || statusColors['Diproses'];
        const items   = order.items || [];
        const total   = order.total || order.total_price || 0;
        const date    = order.date || '-';
        const orderId = order.id || '-';

        return `
          <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800 overflow-hidden">
            <!-- Header -->
            <div class="bg-slate-50 dark:bg-slate-800/60 px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 border-b border-slate-100 dark:border-slate-800">
              <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-0.5">ID Pesanan</p>
                <p class="font-black text-slate-900 dark:text-white text-base">${orderId}</p>
              </div>
              <div class="text-right">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-0.5">Tanggal</p>
                <p class="font-bold text-slate-700 dark:text-slate-300 text-sm">${date}</p>
              </div>
            </div>

            <!-- Items -->
            <div class="p-6 space-y-4">
              ${items.map(item => `
                <div class="flex items-center gap-4">
                  <img src="${item.image || item.image_url || ''}" class="w-16 h-16 rounded-xl object-cover shadow-sm flex-shrink-0"
                    onerror="this.src='https://via.placeholder.com/64x64?text=Sepatu'">
                  <div class="flex-1 min-w-0">
                    <h4 class="font-bold text-slate-900 dark:text-white truncate">${item.name}</h4>
                    <p class="text-sm text-slate-500 dark:text-slate-400 mt-0.5">
                      ${item.qty}x 
                      ${item.selectedSize ? `· Ukuran ${item.selectedSize}` : ''} 
                      · Rp ${Number(item.price).toLocaleString('id-ID')}
                    </p>
                  </div>
                  <p class="font-black text-slate-800 dark:text-white text-sm shrink-0">Rp ${(item.price * item.qty).toLocaleString('id-ID')}</p>
                </div>
              `).join('')}
            </div>

            <!-- Footer -->
            <div class="px-6 py-5 bg-slate-900 dark:bg-indigo-950 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
              <div class="flex items-center gap-3">
                <span class="${colorCls} text-xs px-3 py-1.5 rounded-full font-black uppercase tracking-wide">
                  ${status}
                </span>
                ${order.wa_link ? `
                  <a href="${order.wa_link}" target="_blank"
                    class="text-xs bg-green-500 hover:bg-green-600 text-white px-3 py-1.5 rounded-full font-black uppercase tracking-wide transition">
                    📱 Konfirmasi WA
                  </a>
                ` : ''}
              </div>
              <p class="text-2xl font-black text-white">Rp ${Number(total).toLocaleString('id-ID')}</p>
            </div>
          </div>`;
      }).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Cek login (opsional — user bisa lihat riwayat tanpa login)
      renderOrderHistory();
    });
  </script>
</body>
</html>
