<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Masuk — Alfas Step</title>
  <meta name="description" content="Login ke akun Alfas Step untuk mulai berbelanja sepatu pria premium.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { brand: '#0f172a' } } }
    }
  </script>
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    .shoe-float { animation: float 3s ease-in-out infinite; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .slide-up { animation: slideUp 0.4s ease both; }
    input:focus { box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25); }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen transition-colors duration-300">
  <div id="navbar"></div>

  <div class="min-h-[calc(100vh-80px)] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">

      <!-- Card -->
      <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-2xl p-8 md:p-10 border border-slate-100 dark:border-slate-800 slide-up">

        <!-- Logo & Title -->
        <div class="text-center mb-8">
          <div class="text-5xl mb-4 shoe-float">👟</div>
          <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tighter uppercase">Selamat Datang</h1>
          <p class="text-slate-400 dark:text-slate-500 mt-2 text-sm">Masuk ke akun Alfas Step Anda</p>
        </div>

        <!-- Alert Box -->
        <div id="alert-box" class="hidden mb-6 p-4 rounded-2xl text-sm font-bold text-center"></div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-5" novalidate>
          <div>
            <label class="block text-xs font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 mb-2 ml-1" for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="nama@email.com" required autocomplete="email"
              class="w-full px-5 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white placeholder-slate-300 dark:placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-all duration-200 font-medium">
          </div>

          <div>
            <label class="block text-xs font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 mb-2 ml-1" for="login-password">Password</label>
            <div class="relative">
              <input type="password" id="login-password" placeholder="Minimal 6 karakter" required autocomplete="current-password"
                class="w-full px-5 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white placeholder-slate-300 dark:placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-all duration-200 font-medium pr-14">
              <button type="button" onclick="togglePwd()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600 transition text-xs font-bold uppercase tracking-wide" id="pwd-toggle">
                Lihat
              </button>
            </div>
          </div>

          <button type="submit" id="submit-btn"
            class="w-full bg-slate-900 dark:bg-indigo-600 text-white py-4 rounded-2xl font-black tracking-wide hover:bg-indigo-600 dark:hover:bg-indigo-700 transition-all duration-200 shadow-lg active:scale-95 flex items-center justify-center gap-2 uppercase text-sm">
            <span id="btn-text">Masuk Sekarang</span>
            <svg id="btn-spinner" class="hidden animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
          </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center space-y-3">
          <p class="text-sm text-slate-500 dark:text-slate-400">
            Belum punya akun?
            <a href="register.html" class="text-indigo-600 dark:text-indigo-400 font-black hover:underline ml-1">Daftar Gratis</a>
          </p>
          <p class="text-xs text-slate-400">
            <a href="index.html" class="hover:text-indigo-600 transition">← Kembali ke Toko</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    // Redirect jika sudah login
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof Auth !== 'undefined' && Auth.isLoggedIn()) {
        const redirect = new URLSearchParams(window.location.search).get('redirect');
        window.location.href = redirect ? decodeURIComponent(redirect) : 'index.html';
      }
    });

    // Show/hide password
    function togglePwd() {
      const inp = document.getElementById('login-password');
      const btn = document.getElementById('pwd-toggle');
      if (inp.type === 'password') {
        inp.type = 'text';
        btn.textContent = 'Sembunyikan';
      } else {
        inp.type = 'password';
        btn.textContent = 'Lihat';
      }
    }

    function showAlert(msg, isError = true) {
      const box = document.getElementById('alert-box');
      box.textContent = msg;
      box.className = `mb-6 p-4 rounded-2xl text-sm font-bold text-center ${isError ? 'bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400' : 'bg-green-50 dark:bg-green-900/30 text-green-600 dark:text-green-400'}`;
      box.classList.remove('hidden');
    }

    function setLoading(isLoading) {
      const btn     = document.getElementById('submit-btn');
      const spinner = document.getElementById('btn-spinner');
      const text    = document.getElementById('btn-text');
      btn.disabled  = isLoading;
      spinner.classList.toggle('hidden', !isLoading);
      text.textContent = isLoading ? 'Memverifikasi...' : 'Masuk Sekarang';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        showAlert('Email dan password wajib diisi!');
        return;
      }

      setLoading(true);
      document.getElementById('alert-box').classList.add('hidden');

      try {
        const success = await Auth.login(email, password);
        if (success) {
          showAlert('Login berhasil! Mengalihkan...', false);
          setTimeout(() => {
            const redirect = new URLSearchParams(window.location.search).get('redirect');
            window.location.href = redirect ? decodeURIComponent(redirect) : 'index.html';
          }, 800);
        } else {
          showAlert('Email atau password salah. Silakan coba lagi.');
          setLoading(false);
        }
      } catch (err) {
        showAlert('Terjadi kesalahan. Coba lagi.');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
