<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout — Alfas Step</title>
  <meta name="description" content="Selesaikan pembelian sepatu pria premium Alfas Step. Isi data pengiriman dan konfirmasi pesanan.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    input:focus, textarea:focus { box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease both; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen transition-colors duration-300">
  <div id="navbar"></div>

  <main class="max-w-5xl mx-auto px-4 py-12">
    <div class="mb-8">
      <h1 class="text-3xl font-black text-slate-900 dark:text-white uppercase tracking-tighter">Checkout</h1>
      <p class="text-slate-400 text-sm mt-1">Lengkapi data pengiriman untuk konfirmasi pesanan Anda</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 fade-in">

      <!-- Form Data Pengiriman -->
      <section class="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800">
        <h2 class="text-xl font-black mb-6 dark:text-white uppercase tracking-tighter flex items-center gap-2">
          <span class="w-8 h-8 bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 rounded-full flex items-center justify-center text-sm font-black">1</span>
          Data Pengiriman
        </h2>
        <form id="checkout-form" class="space-y-5" novalidate>
          <div>
            <label class="block text-xs font-bold text-slate-400 uppercase mb-2 tracking-widest">Nama Lengkap</label>
            <input type="text" id="cust-name" required placeholder="Masukkan nama penerima"
              class="w-full px-4 py-3.5 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:outline-none focus:border-indigo-500 transition font-medium text-sm">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-400 uppercase mb-2 tracking-widest">Nomor WhatsApp</label>
            <input type="tel" id="cust-phone" required placeholder="Contoh: 088269447882"
              class="w-full px-4 py-3.5 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:outline-none focus:border-indigo-500 transition font-medium text-sm">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-400 uppercase mb-2 tracking-widest">Alamat Lengkap</label>
            <textarea id="cust-address" required rows="3" placeholder="Nama jalan, nomor rumah, RT/RW, Kecamatan, Kota"
              class="w-full px-4 py-3.5 rounded-xl border border-slate-200 dark:border-slate-700 dark:bg-slate-800 dark:text-white focus:outline-none focus:border-indigo-500 transition font-medium text-sm resize-none"></textarea>
          </div>

          <!-- Alert -->
          <div id="checkout-alert" class="hidden p-4 rounded-xl text-sm font-bold"></div>

          <button type="submit" id="checkout-btn"
            class="w-full bg-slate-900 dark:bg-indigo-600 text-white py-4 rounded-2xl font-black hover:bg-indigo-600 dark:hover:bg-indigo-700 transition shadow-lg uppercase tracking-widest text-sm active:scale-95 flex items-center justify-center gap-2">
            <span id="checkout-btn-text">Konfirmasi & Pesan via WhatsApp</span>
            <svg id="checkout-spinner" class="hidden animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
          </button>

          <p class="text-xs text-slate-400 text-center">
            🔒 Data Anda aman. Pesanan akan dikonfirmasi melalui WhatsApp owner.
          </p>
        </form>
      </section>

      <!-- Ringkasan Pesanan -->
      <section class="bg-slate-50 dark:bg-slate-800/40 p-8 rounded-3xl h-fit border border-slate-100 dark:border-slate-800">
        <h2 class="text-xl font-black mb-6 dark:text-white uppercase tracking-tighter flex items-center gap-2">
          <span class="w-8 h-8 bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 rounded-full flex items-center justify-center text-sm font-black">2</span>
          Ringkasan Pesanan
        </h2>

        <div id="checkout-summary" class="space-y-4 mb-6"></div>

        <div class="border-t border-slate-200 dark:border-slate-700 pt-5">
          <div class="flex justify-between items-center mb-2">
            <span class="text-slate-500 dark:text-slate-400 text-sm font-bold">Subtotal</span>
            <span id="checkout-subtotal" class="font-bold text-slate-700 dark:text-slate-300">Rp 0</span>
          </div>
          <div class="flex justify-between items-center mb-4">
            <span class="text-slate-500 dark:text-slate-400 text-sm font-bold">Ongkos Kirim</span>
            <span class="text-green-600 font-bold text-sm">GRATIS</span>
          </div>
          <div class="flex justify-between items-center pt-4 border-t border-slate-200 dark:border-slate-700">
            <span class="font-black text-slate-900 dark:text-white uppercase tracking-wide">Total Pembayaran</span>
            <span id="checkout-total" class="text-2xl font-black text-indigo-600 dark:text-indigo-400">Rp 0</span>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/cart.js"></script>
  <script>
    const API_BASE = 'http://localhost:3000';

    // ── Proteksi: harus login & cart tidak boleh kosong
    function initCheckout() {
      // Cek login
      if (typeof Auth !== 'undefined' && !Auth.isLoggedIn()) {
        window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
        return;
      }

      const items = Cart.get();
      if (!items || items.length === 0) {
        alert('Keranjang kosong, silakan pilih produk terlebih dahulu.');
        window.location.href = 'index.html';
        return;
      }

      // Pre-fill nama dari user yang login
      const user = Auth.getCurrentUser();
      if (user) document.getElementById('cust-name').value = user.name || '';

      renderSummary(items);
    }

    function renderSummary(items) {
      const summary  = document.getElementById('checkout-summary');
      const totalEl  = document.getElementById('checkout-total');
      const subtotEl = document.getElementById('checkout-subtotal');

      let total = 0;
      summary.innerHTML = items.map(item => {
        const subtotal = item.price * item.qty;
        total += subtotal;
        return `
          <div class="flex items-center justify-between gap-3">
            <div class="flex items-center gap-3">
              <img src="${item.image || item.image_url}" class="w-14 h-14 rounded-xl object-cover shadow-sm" alt="${item.name}"
                onerror="this.src='https://via.placeholder.com/56x56?text=Sepatu'">
              <div>
                <p class="font-bold text-slate-900 dark:text-white text-sm leading-tight">${item.name}</p>
                <p class="text-xs text-slate-400 mt-0.5">Ukuran ${item.selectedSize} · ${item.qty}x</p>
              </div>
            </div>
            <span class="font-black text-slate-800 dark:text-white text-sm whitespace-nowrap">Rp ${subtotal.toLocaleString('id-ID')}</span>
          </div>`;
      }).join('');

      subtotEl.textContent = `Rp ${total.toLocaleString('id-ID')}`;
      totalEl.textContent  = `Rp ${total.toLocaleString('id-ID')}`;
    }

    function showAlert(msg, isError = true) {
      const box = document.getElementById('checkout-alert');
      box.textContent = msg;
      box.className = `p-4 rounded-xl text-sm font-bold ${isError ? 'bg-red-50 dark:bg-red-900/30 text-red-600' : 'bg-green-50 dark:bg-green-900/30 text-green-600'}`;
      box.classList.remove('hidden');
    }

    function setLoading(on) {
      document.getElementById('checkout-btn').disabled = on;
      document.getElementById('checkout-spinner').classList.toggle('hidden', !on);
      document.getElementById('checkout-btn-text').textContent = on ? 'Memproses Pesanan...' : 'Konfirmasi & Pesan via WhatsApp';
    }

    document.getElementById('checkout-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name    = document.getElementById('cust-name').value.trim();
      const phone   = document.getElementById('cust-phone').value.trim();
      const address = document.getElementById('cust-address').value.trim();
      const items   = Cart.get();
      const total   = Cart.getTotal();

      if (!name || !phone || !address) { showAlert('Semua data pengiriman wajib diisi!'); return; }
      if (items.length === 0)          { showAlert('Keranjang kosong!'); return; }

      setLoading(true);
      document.getElementById('checkout-alert').classList.add('hidden');

      try {
        // POST ke backend API
        const res = await fetch(`${API_BASE}/api/checkout`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            customer_name: name,
            customer_phone: phone,
            customer_address: address,
            items: items.map(i => ({
              id: i.id,
              name: i.name,
              price: i.price,
              qty: i.qty,
              selectedSize: i.selectedSize
            })),
            total_price: total
          })
        });

        const data = await res.json();
        setLoading(false);

        if (res.ok && data.success) {
          // Simpan ke riwayat lokal juga
          const history = JSON.parse(localStorage.getItem('alfas_orders') || '[]');
          history.unshift({
            id: `#${data.order_id}`,
            date: new Date().toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' }),
            customer: { name, phone, address },
            items,
            total,
            status: 'Diproses',
            wa_link: data.wa_link
          });
          localStorage.setItem('alfas_orders', JSON.stringify(history));

          // Kosongkan keranjang
          Cart.clear();

          // Tampilkan sukses lalu buka WhatsApp
          showAlert(`Pesanan #${data.order_id} berhasil! Membuka WhatsApp...`, false);
          setTimeout(() => {
            window.open(data.wa_link, '_blank');
            window.location.href = 'order-history.html';
          }, 1500);

        } else {
          showAlert(data.error || 'Gagal memproses pesanan. Coba lagi.');
        }

      } catch (err) {
        setLoading(false);
        // Fallback: simpan ke localStorage saja tanpa backend
        const history = JSON.parse(localStorage.getItem('alfas_orders') || '[]');
        const localId = 'INV-' + Date.now();
        const msgLines = [
          '*Pesanan Baru - ALFAS STEP*', '',
          `Nama     : ${name}`,
          `Telepon  : ${phone}`,
          `Alamat   : ${address}`,
          '', '*Detail Pesanan:*'
        ];
        items.forEach((item, i) => {
          msgLines.push(`${i+1}. ${item.name}`);
          msgLines.push(`   Ukuran ${item.selectedSize} | ${item.qty}x | Rp ${Number(item.price).toLocaleString('id-ID')}`);
        });
        msgLines.push('', `*Total: Rp ${total.toLocaleString('id-ID')}*`);
        msgLines.push('', `*ID Pesanan: ${localId}*`);

        const waLink = `https://wa.me/6288269447882?text=${encodeURIComponent(msgLines.join('\n'))}`;

        history.unshift({
          id: localId,
          date: new Date().toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' }),
          customer: { name, phone, address },
          items,
          total,
          status: 'Diproses',
          wa_link: waLink
        });
        localStorage.setItem('alfas_orders', JSON.stringify(history));
        Cart.clear();

        showAlert('Pesanan disimpan (mode offline). Membuka WhatsApp...', false);
        setTimeout(() => {
          window.open(waLink, '_blank');
          window.location.href = 'order-history.html';
        }, 1500);
      }
    });

    document.addEventListener('DOMContentLoaded', initCheckout);
  </script>
</body>
</html>
