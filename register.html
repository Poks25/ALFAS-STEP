<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daftar Akun — Alfas Step</title>
  <meta name="description" content="Buat akun Alfas Step untuk mulai berbelanja sepatu pria premium dengan mudah.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { brand: '#0f172a' } } }
    }
  </script>
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    .shoe-float { animation: float 3s ease-in-out infinite; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .slide-up { animation: slideUp 0.4s ease both; }
    input:focus { box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25); }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen transition-colors duration-300">
  <div id="navbar"></div>

  <div class="min-h-[calc(100vh-80px)] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">

      <div class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-2xl p-8 md:p-10 border border-slate-100 dark:border-slate-800 slide-up">

        <!-- Logo & Title -->
        <div class="text-center mb-8">
          <div class="text-5xl mb-4 shoe-float">👟</div>
          <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tighter uppercase">Buat Akun</h1>
          <p class="text-slate-400 dark:text-slate-500 mt-2 text-sm">Bergabung dengan komunitas Alfas Step</p>
        </div>

        <!-- Alert Box -->
        <div id="alert-box" class="hidden mb-6 p-4 rounded-2xl text-sm font-bold text-center"></div>

        <!-- Register Form -->
        <form id="register-form" class="space-y-5" novalidate>
          <div>
            <label class="block text-xs font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 mb-2 ml-1" for="reg-name">Nama Lengkap</label>
            <input type="text" id="reg-name" placeholder="Masukkan nama Anda" required autocomplete="name"
              class="w-full px-5 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white placeholder-slate-300 dark:placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-all duration-200 font-medium">
          </div>

          <div>
            <label class="block text-xs font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 mb-2 ml-1" for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="nama@email.com" required autocomplete="email"
              class="w-full px-5 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white placeholder-slate-300 dark:placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-all duration-200 font-medium">
          </div>

          <div>
            <label class="block text-xs font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 mb-2 ml-1" for="reg-password">Password</label>
            <div class="relative">
              <input type="password" id="reg-password" placeholder="Min. 6 karakter" required autocomplete="new-password"
                class="w-full px-5 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white placeholder-slate-300 dark:placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-all duration-200 font-medium pr-14">
              <button type="button" onclick="togglePwd()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600 transition text-xs font-bold uppercase tracking-wide" id="pwd-toggle">
                Lihat
              </button>
            </div>
            <!-- Password strength indicator -->
            <div class="flex gap-1 mt-2" id="pwd-strength">
              <div class="h-1 flex-1 rounded-full bg-slate-200 dark:bg-slate-700 transition-all" id="str-1"></div>
              <div class="h-1 flex-1 rounded-full bg-slate-200 dark:bg-slate-700 transition-all" id="str-2"></div>
              <div class="h-1 flex-1 rounded-full bg-slate-200 dark:bg-slate-700 transition-all" id="str-3"></div>
            </div>
          </div>

          <button type="submit" id="submit-btn"
            class="w-full bg-slate-900 dark:bg-indigo-600 text-white py-4 rounded-2xl font-black tracking-wide hover:bg-indigo-600 dark:hover:bg-indigo-700 transition-all duration-200 shadow-lg active:scale-95 flex items-center justify-center gap-2 uppercase text-sm">
            <span id="btn-text">Buat Akun Sekarang</span>
            <svg id="btn-spinner" class="hidden animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
          </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center space-y-3">
          <p class="text-sm text-slate-500 dark:text-slate-400">
            Sudah punya akun?
            <a href="login.html" class="text-indigo-600 dark:text-indigo-400 font-black hover:underline ml-1">Masuk di sini</a>
          </p>
          <p class="text-xs text-slate-400">
            <a href="index.html" class="hover:text-indigo-600 transition">← Kembali ke Toko</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    // Redirect jika sudah login
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof Auth !== 'undefined' && Auth.isLoggedIn()) {
        window.location.href = 'index.html';
      }
    });

    function togglePwd() {
      const inp = document.getElementById('reg-password');
      const btn = document.getElementById('pwd-toggle');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? 'Lihat' : 'Sembunyikan';
    }

    // Password strength
    document.getElementById('reg-password').addEventListener('input', function() {
      const val = this.value;
      const bars = [document.getElementById('str-1'), document.getElementById('str-2'), document.getElementById('str-3')];
      bars.forEach(b => b.className = 'h-1 flex-1 rounded-full bg-slate-200 dark:bg-slate-700 transition-all');
      if (val.length >= 6) bars[0].className = 'h-1 flex-1 rounded-full bg-red-400 transition-all';
      if (val.length >= 10 || (val.length >= 6 && /[0-9]/.test(val))) bars[1].className = 'h-1 flex-1 rounded-full bg-yellow-400 transition-all';
      if (val.length >= 8 && /[0-9]/.test(val) && /[A-Za-z]/.test(val)) bars[2].className = 'h-1 flex-1 rounded-full bg-green-400 transition-all';
    });

    function showAlert(msg, isError = true) {
      const box = document.getElementById('alert-box');
      box.textContent = msg;
      box.className = `mb-6 p-4 rounded-2xl text-sm font-bold text-center ${isError ? 'bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400' : 'bg-green-50 dark:bg-green-900/30 text-green-600 dark:text-green-400'}`;
      box.classList.remove('hidden');
    }

    function setLoading(isLoading) {
      const btn     = document.getElementById('submit-btn');
      const spinner = document.getElementById('btn-spinner');
      const text    = document.getElementById('btn-text');
      btn.disabled  = isLoading;
      spinner.classList.toggle('hidden', !isLoading);
      text.textContent = isLoading ? 'Mendaftarkan...' : 'Buat Akun Sekarang';
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name     = document.getElementById('reg-name').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;

      if (!name || !email || !password) {
        showAlert('Semua kolom wajib diisi!');
        return;
      }
      if (password.length < 6) {
        showAlert('Password minimal 6 karakter!');
        return;
      }

      setLoading(true);
      document.getElementById('alert-box').classList.add('hidden');

      try {
        const result = await Auth.register(name, email, password);
        if (result.success) {
          showAlert('Pendaftaran berhasil! Mengalihkan ke beranda...', false);
          setTimeout(() => { window.location.href = 'index.html'; }, 1200);
        } else {
          showAlert(result.msg || 'Gagal mendaftar. Coba lagi.');
          setLoading(false);
        }
      } catch (err) {
        showAlert('Terjadi kesalahan. Coba lagi.');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
